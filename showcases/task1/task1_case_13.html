function calcMA(data, period) {
  var result = [];
  for (var i = 0; i < data.length; i++) {
    if (i < period - 1) { result.push('-'); }
    else {
      var sum = 0;
      for (var j = i - period + 1; j <= i; j++) sum += data[j][1];
      result.push(+(sum / period).toFixed(2));
    }
  }
  return result;
}
