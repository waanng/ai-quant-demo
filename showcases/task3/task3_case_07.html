<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双均线策略回测看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif;
  background: #f5f6fa; color: #2c3e50;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #2c3e50, #34495e);
  color: #fff; padding: 16px 28px;
  display: flex; align-items: center; gap: 12px;
}
.header h1 { font-size: 22px; font-weight: 600; }
.header .subtitle { font-size: 13px; opacity: 0.7; }

.layout { display: flex; height: calc(100vh - 58px); }

/* === Sidebar === */
.sidebar {
  width: 290px; min-width: 290px;
  background: #fff; border-right: 1px solid #e0e0e0;
  padding: 20px 18px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 18px;
}
.ctrl-group { display: flex; flex-direction: column; gap: 6px; }
.ctrl-group label {
  font-size: 13px; font-weight: 600; color: #555;
  display: flex; justify-content: space-between; align-items: baseline;
}
.ctrl-group label .val { font-weight: 400; color: #e74c3c; font-size: 12px; }
.ctrl-group select {
  padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
  font-size: 14px; background: #fafafa; cursor: pointer;
}
.ctrl-group input[type="range"] {
  width: 100%; accent-color: #e74c3c;
}
.ctrl-group .checkbox-row {
  display: flex; align-items: center; gap: 8px; font-size: 13px;
}
.ctrl-group .checkbox-row input { accent-color: #e74c3c; }
.sidebar .run-btn {
  width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff; border: none; border-radius: 8px; cursor: pointer;
  transition: opacity 0.2s;
}
.sidebar .run-btn:hover { opacity: 0.9; }
.sidebar .run-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.sidebar .stock-info {
  font-size: 11px; color: #999; padding: 8px;
  background: #f8f9fa; border-radius: 6px; text-align: center;
}

/* === Content === */
.content {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 20px;
}
.chart-card {
  background: #fff; border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  padding: 16px 20px;
}
.chart-card h3 {
  font-size: 15px; font-weight: 600; margin-bottom: 10px;
  color: #2c3e50;
}
.chart-card .chart-wrap { position: relative; width: 100%; }
.chart-card .chart-wrap canvas { width: 100% !important; }

.tables-row { display: flex; gap: 20px; }
.tables-row .chart-card { flex: 1; min-width: 0; }

/* === Tables === */
.metrics-table, .trades-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.metrics-table th {
  background: #2c3e50; color: #fff; padding: 8px 12px;
  text-align: left; font-weight: 500;
}
.metrics-table td { padding: 6px 12px; border-bottom: 1px solid #eee; }
.metrics-table .cat-cell { font-weight: 600; color: #555; }
.metrics-table .s-better { color: #e74c3c; font-weight: 600; }
.metrics-table .bh-better { color: #3498db; font-weight: 600; }
.metrics-table tr:hover { background: #f8f9fa; }

.trades-table th {
  background: #2c3e50; color: #fff; padding: 6px 10px;
  text-align: left; font-weight: 500; font-size: 12px;
}
.trades-table td { padding: 5px 10px; border-bottom: 1px solid #eee; font-size: 12px; }
.trades-table .win-row { background: #fff5f5; }
.trades-table .loss-row { background: #f5fff5; }

.status-bar {
  background: #fff; border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  padding: 12px 20px; display: flex; gap: 30px;
  font-size: 13px;
}
.status-bar .metric { display: flex; flex-direction: column; }
.status-bar .metric .label { color: #999; font-size: 11px; }
.status-bar .metric .value { font-size: 16px; font-weight: 600; }
.status-bar .metric .value.red { color: #e74c3c; }
.status-bar .metric .value.green { color: #27ae60; }
.status-bar .metric .value.blue { color: #3498db; }

@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; flex-direction: row; flex-wrap: wrap; }
  .tables-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="header">
  <h1>双均线策略回测看板</h1>
  <span class="subtitle">数据来源：akshare 前复权 · 仅供参考</span>
</div>

<div class="layout">
  <!-- Sidebar Controls -->
  <div class="sidebar">
    <div class="ctrl-group">
      <label>股票选择</label>
      <select id="stockSelect"></select>
    </div>
    <div class="ctrl-group">
      <label>短期 MA <span class="val" id="shortVal">5</span></label>
      <input type="range" id="shortMA" min="2" max="50" value="5" step="1">
    </div>
    <div class="ctrl-group">
      <label>长期 MA <span class="val" id="longVal">20</span></label>
      <input type="range" id="longMA" min="10" max="200" value="20" step="1">
    </div>
    <div class="ctrl-group">
      <label>仓位比例 <span class="val" id="posVal">100%</span></label>
      <input type="range" id="positionRatio" min="5" max="100" value="100" step="5">
    </div>
    <div class="ctrl-group">
      <label>手续费率 <span class="val" id="feeVal">0.03%</span></label>
      <input type="range" id="commission" min="0" max="50" value="3" step="1">
    </div>
    <div class="ctrl-group">
      <label>滑点 <span class="val" id="slipVal">0.00%</span></label>
      <input type="range" id="slippage" min="0" max="50" value="0" step="5">
    </div>
    <div class="ctrl-group">
      <div class="checkbox-row">
        <input type="checkbox" id="limitFilter" checked>
        <label for="limitFilter" style="font-weight:400;">涨跌停过滤</label>
      </div>
    </div>
    <button class="run-btn" id="runBtn" onclick="runBacktest()">运行回测</button>
    <div class="stock-info" id="stockInfo">—</div>
  </div>

  <!-- Content Area -->
  <div class="content">
    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="metric"><span class="label">策略累计收益</span><span class="value red" id="statRet">—</span></div>
      <div class="metric"><span class="label">最大回撤</span><span class="value green" id="statDD">—</span></div>
      <div class="metric"><span class="label">夏普比率</span><span class="value blue" id="statSharpe">—</span></div>
      <div class="metric"><span class="label">胜率</span><span class="value" id="statWin">—</span></div>
      <div class="metric"><span class="label">交易次数</span><span class="value" id="statTrades">—</span></div>
    </div>

    <!-- Chart 1: Main -->
    <div class="chart-card">
      <h3 id="mainChartTitle">价格走势 & 交易信号</h3>
      <div class="chart-wrap"><canvas id="mainChart" height="360"></canvas></div>
    </div>

    <!-- Chart 2: Equity Curve -->
    <div class="chart-card">
      <h3>净值曲线对比</h3>
      <div class="chart-wrap"><canvas id="equityChart" height="280"></canvas></div>
    </div>

    <!-- Chart 3: Drawdown -->
    <div class="chart-card">
      <h3>回撤分析</h3>
      <div class="chart-wrap"><canvas id="drawdownChart" height="220"></canvas></div>
    </div>

    <!-- Tables: Metrics + Trades -->
    <div class="tables-row">
      <div class="chart-card">
        <h3>评估指标对比</h3>
        <div id="metricsTable"></div>
      </div>
      <div class="chart-card">
        <h3>交易明细</h3>
        <div id="tradesTable"></div>
      </div>
    </div>
  </div>
</div>

// ============================================================
// CONSTANTS
// ============================================================
const TRADING_DAYS = 252;
const RF_RATE = 0.02;
const COLORS = { red: '#e74c3c', green: '#27ae60', blue: '#3498db', dark: '#2c3e50', gray: '#95a5a6', orange: '#f39c12', purple: '#9b59b6', bgRed: 'rgba(231,76,60,0.06)', bgGreen: 'rgba(39,174,96,0.04)' };

// ============================================================
// UTILS
// ============================================================
function parseDate(s) { return new Date(s); }

function fmtPct(x) { return (x * 100).toFixed(2) + '%'; }
function fmtNum(x, d) { return typeof x === 'number' ? x.toFixed(d || 2) : '—'; }

// ============================================================
// MOVING AVERAGE
// ============================================================
function computeMA(prices, window) {
  const result = new Array(prices.length).fill(null);
  let sum = 0, count = 0;
  for (let i = 0; i < prices.length; i++) {
    const p = prices[i];
    if (p != null) { sum += p; count++; }
    if (i >= window) {
      const old = prices[i - window];
      if (old != null) { sum -= old; count--; }
    }
    result[i] = count >= window ? sum / count : null;
  }
  return result;
}

// ============================================================
// STRATEGY COMPUTATION
// ============================================================
function computeStrategy(data, shortWindow, longWindow) {
  const prices = data.map(d => d.close);
  const maShort = computeMA(prices, shortWindow);
  const maLong = computeMA(prices, longWindow);

  const n = data.length;
  const signal = new Array(n).fill(null);
  const goldenCross = new Array(n).fill(0);
  const deathCross = new Array(n).fill(0);
  let prevSignal = null;

  for (let i = 0; i < n; i++) {
    if (maShort[i] != null && maLong[i] != null) {
      signal[i] = maShort[i] > maLong[i] ? 1 : 0;
    }
    if (i > 0 && signal[i] !== null && prevSignal !== null) {
      if (prevSignal === 0 && signal[i] === 1) goldenCross[i] = 1;
      if (prevSignal === 1 && signal[i] === 0) deathCross[i] = 1;
    }
    prevSignal = signal[i];
  }

  // Position = signal shifted by 1 (trade next day)
  const position = new Array(n).fill(0);
  for (let i = 1; i < n; i++) {
    position[i] = signal[i - 1] != null ? signal[i - 1] : 0;
  }

  return { maShort, maLong, signal, goldenCross, deathCross, position };
}

// ============================================================
// TRADING SIMULATION
// ============================================================
function simulateTrading(data, strat, options) {
  const { initialCapital, commission, slippage, limitFilter, positionRatio } = options;
  const n = data.length;

  let cash = initialCapital, shares = 0, inPosition = false;
  let entryDate = null, entryPrice = 0, entryShares = 0;
  const equity = new Array(n).fill(initialCapital);
  const dailyReturn = new Array(n).fill(null);
  const tradeActions = new Array(n).fill('');
  let skippedCount = 0;
  const trades = [];

  for (let i = 0; i < n; i++) {
    const row = data[i];
    const price = row.close;
    const prevClose = row.pre_close;
    let action = '';

    // Limit up/down check
    const limitUp = prevClose * 1.10;
    const limitDown = prevClose * 0.90;
    const isLimitUp = price >= limitUp * 0.999;
    const isLimitDown = price <= limitDown * 1.001;

    // Buy logic
    if (strat.goldenCross[i] === 1 && cash > 0 && !inPosition) {
      if (limitFilter && isLimitUp) {
        skippedCount++;
      } else {
        const buyPrice = price * (1 + slippage);
        const availableCash = cash * positionRatio;
        const sharesToBuy = Math.floor(availableCash / (buyPrice * (1 + commission)));
        if (sharesToBuy > 0) {
          const cost = sharesToBuy * buyPrice * (1 + commission);
          cash -= cost;
          shares = sharesToBuy;
          inPosition = true;
          entryDate = row.date;
          entryPrice = buyPrice;
          entryShares = shares;
          action = '买入';
        }
      }
    }
    // Sell logic
    else if (strat.deathCross[i] === 1 && shares > 0 && inPosition) {
      if (limitFilter && isLimitDown) {
        skippedCount++;
      } else {
        const sellPrice = price * (1 - slippage);
        const revenue = shares * sellPrice * (1 - commission);
        cash += revenue;
        const pnl = (sellPrice - entryPrice) / entryPrice;
        const entryD = parseDate(entryDate);
        const exitD = parseDate(row.date);
        const holdingDays = Math.max(1, Math.round((exitD - entryD) / (1000 * 60 * 60 * 24)));
        trades.push({
          entryDate, exitDate: row.date, entryPrice, exitPrice: sellPrice,
          shares, pnlPct: pnl * 100,
          pnlAmount: revenue - entryShares * entryPrice * (1 + commission),
          holdingDays, isWin: pnl > 0
        });
        shares = 0; inPosition = false; action = '卖出';
      }
    }

    equity[i] = cash + shares * price;
    tradeActions[i] = action;

    if (i > 0) {
      dailyReturn[i] = (equity[i] - equity[i - 1]) / equity[i - 1];
    }
  }

  // Force close at end if still holding
  if (shares > 0 && inPosition) {
    const lastPrice = data[n - 1].close;
    const sellPrice = lastPrice * (1 - slippage);
    cash += shares * sellPrice * (1 - commission);
    const pnl = (sellPrice - entryPrice) / entryPrice;
    const entryD = parseDate(entryDate);
    const exitD = parseDate(data[n - 1].date);
    const holdingDays = Math.max(1, Math.round((exitD - entryD) / (1000 * 60 * 60 * 24)));
    trades.push({
      entryDate, exitDate: data[n - 1].date, entryPrice, exitPrice: sellPrice,
      shares, pnlPct: pnl * 100,
      pnlAmount: (sellPrice - entryPrice - 2 * slippage * entryPrice) * shares,
      holdingDays, isWin: pnl > 0
    });
    equity[n - 1] = cash;
  }

  return { equity, dailyReturn, tradeActions, trades, skippedCount };
}

// ============================================================
// BUY & HOLD
// ============================================================
function simulateBuyHold(data, initialCapital, positionRatio) {
  const n = data.length;
  const firstPrice = data[0].close;
  const investCapital = initialCapital * positionRatio;
  const shares = Math.floor(investCapital / firstPrice);
  const bhEquity = new Array(n);
  const bhDailyReturn = new Array(n).fill(null);

  for (let i = 0; i < n; i++) {
    bhEquity[i] = initialCapital - shares * firstPrice + shares * data[i].close;
    if (i > 0) bhDailyReturn[i] = (bhEquity[i] - bhEquity[i - 1]) / bhEquity[i - 1];
    else bhDailyReturn[i] = 0;
  }

  return { bhEquity, bhDailyReturn };
}

// ============================================================
// METRICS COMPUTATION
// ============================================================
function computeMetrics(stratResult, bhResult, trades) {
  function calc(dailyRet, equity) {
    const valid = dailyRet.filter(r => r != null && !isNaN(r));
    if (valid.length < 2) return {};

    const totalDays = equity.length;
    const years = totalDays / TRADING_DAYS;

    const totalReturn = (equity[equity.length - 1] / equity[0]) - 1;
    const annualReturn = Math.pow(1 + totalReturn, 1 / Math.max(years, 0.01)) - 1;

    const mean = valid.reduce((a, b) => a + b, 0) / valid.length;
    const variance = valid.reduce((s, r) => s + (r - mean) ** 2, 0) / valid.length;
    const dailyStd = Math.sqrt(variance);
    const annualVol = dailyStd * Math.sqrt(TRADING_DAYS);

    let peak = equity[0], maxDD = 0;
    for (let i = 0; i < equity.length; i++) {
      if (equity[i] > peak) peak = equity[i];
      const dd = (equity[i] - peak) / peak;
      if (dd < maxDD) maxDD = dd;
    }

    const downside = valid.filter(r => r < 0);
    let downStd = 0;
    if (downside.length > 0) {
      const dm = downside.reduce((a, b) => a + b, 0) / downside.length;
      const dv = downside.reduce((s, r) => s + (r - dm) ** 2, 0) / downside.length;
      downStd = Math.sqrt(dv) * Math.sqrt(TRADING_DAYS);
    }

    const excess = annualReturn - RF_RATE;
    const sharpe = annualVol > 0 ? excess / annualVol : 0;
    const sortino = downStd > 0 ? excess / downStd : 0;
    const calmar = Math.abs(maxDD) > 0 ? annualReturn / Math.abs(maxDD) : 0;

    return { totalReturn, annualReturn, annualVol, maxDD, sharpe, sortino, calmar };
  }

  const s = calc(stratResult.dailyReturn, stratResult.equity);
  const bh = calc(bhResult.bhDailyReturn, bhResult.bhEquity);

  const result = {};
  result['策略_累计收益率'] = s.totalReturn * 100;
  result['策略_年化收益率'] = s.annualReturn * 100;
  result['策略_年化波动率'] = s.annualVol * 100;
  result['策略_最大回撤'] = s.maxDD * 100;
  result['策略_夏普比率'] = s.sharpe;
  result['策略_索提诺比率'] = s.sortino;
  result['策略_卡玛比率'] = s.calmar;

  result['买入持有_累计收益率'] = bh.totalReturn * 100;
  result['买入持有_年化收益率'] = bh.annualReturn * 100;
  result['买入持有_年化波动率'] = bh.annualVol * 100;
  result['买入持有_最大回撤'] = bh.maxDD * 100;
  result['买入持有_夏普比率'] = bh.sharpe;
  result['买入持有_索提诺比率'] = bh.sortino;
  result['买入持有_卡玛比率'] = bh.calmar;

  if (trades && trades.length > 0) {
    const wins = trades.filter(t => t.isWin);
    const losses = trades.filter(t => !t.isWin);
    result['交易_总次数'] = trades.length;
    result['交易_胜率'] = (wins.length / trades.length) * 100;
    result['交易_平均盈利(%)'] = wins.length > 0 ? wins.reduce((s, t) => s + t.pnlPct, 0) / wins.length : 0;
    result['交易_平均亏损(%)'] = losses.length > 0 ? -losses.reduce((s, t) => s + Math.abs(t.pnlPct), 0) / losses.length : 0;
    const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + t.pnlPct, 0) / wins.length : 0;
    const avgLoss = losses.length > 0 ? losses.reduce((s, t) => s + Math.abs(t.pnlPct), 0) / losses.length : 0;
    result['交易_盈亏比'] = avgLoss > 0 ? avgWin / avgLoss : 0;
    result['交易_平均持仓天数'] = trades.reduce((s, t) => s + t.holdingDays, 0) / trades.length;
    result['交易_累计盈亏(元)'] = trades.reduce((s, t) => s + t.pnlAmount, 0);
  } else {
    result['交易_总次数'] = 0;
  }

  return result;
}

let mainChartInst = null, equityChartInst = null, ddChartInst = null;

function destroyCharts() {
  [mainChartInst, equityChartInst, ddChartInst].forEach(c => { if (c) c.destroy(); });
  mainChartInst = equityChartInst = ddChartInst = null;

  // Replace canvas elements to prevent height accumulation
  [{id: 'mainChart', h: 360}, {id: 'equityChart', h: 280}, {id: 'drawdownChart', h: 220}].forEach(cfg => {
    const old = document.getElementById(cfg.id);
    if (old) {
      const parent = old.parentNode;
      const fresh = document.createElement('canvas');
      fresh.id = cfg.id;
      fresh.height = cfg.h;
      parent.replaceChild(fresh, old);
    }
  });
}

function renderMainChart(data, strat, stockName, shortW, longW) {
  const dates = data.map(d => parseDate(d.date));
  const labels = data.map(d => d.date);
  const prices = data.map(d => d.close);

  // Golden cross markers
  const gcData = [];
  const dcData = [];
  for (let i = 0; i < data.length; i++) {
    if (strat.goldenCross[i] === 1) gcData.push({ x: dates[i], y: prices[i] * 0.97 });
    if (strat.deathCross[i] === 1) dcData.push({ x: dates[i], y: prices[i] * 1.03 });
  }

  // Holding period background
  const holdingRanges = [];
  let holdStart = null;
  for (let i = 0; i < data.length; i++) {
    if (strat.signal[i] === 1 && holdStart === null) holdStart = dates[i];
    else if (strat.signal[i] === 0 && holdStart !== null) {
      holdingRanges.push({ start: holdStart, end: dates[i] });
      holdStart = null;
    }
  }
  if (holdStart !== null) holdingRanges.push({ start: holdStart, end: dates[dates.length - 1] });

  const ctx = document.getElementById('mainChart').getContext('2d');

  // Custom plugin for holding period background
  const holdingBgPlugin = {
    id: 'holdingBg',
    beforeDraw(chart) {
      const { ctx, chartArea, scales: { x } } = chart;
      if (!chartArea) return;
      ctx.save();
      holdingRanges.forEach(r => {
        const x0 = x.getPixelForValue(r.start);
        const x1 = x.getPixelForValue(r.end);
        ctx.fillStyle = COLORS.bgRed;
        ctx.fillRect(x0, chartArea.top, x1 - x0, chartArea.bottom - chartArea.top);
      });
      ctx.restore();
    }
  };

  mainChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '收盘价', data: prices,
          borderColor: COLORS.dark, borderWidth: 1.2,
          pointRadius: 0, tension: 0, fill: false, order: 3
        },
        {
          label: `MA(${shortW})`, data: strat.maShort,
          borderColor: COLORS.red, borderWidth: 1.5,
          pointRadius: 0, tension: 0, fill: false, order: 2
        },
        {
          label: `MA(${longW})`, data: strat.maLong,
          borderColor: COLORS.blue, borderWidth: 1.5,
          pointRadius: 0, tension: 0, fill: false, order: 2
        },
        {
          label: `金叉买入 (${gcData.length})`, data: gcData,
          type: 'scatter',
          backgroundColor: COLORS.red, borderColor: '#a93226',
          borderWidth: 0.5, pointRadius: 7, pointStyle: 'triangle',
          rotation: 0, order: 1
        },
        {
          label: `死叉卖出 (${dcData.length})`, data: dcData,
          type: 'scatter',
          backgroundColor: COLORS.green, borderColor: '#1e8449',
          borderWidth: 0.5, pointRadius: 7, pointStyle: 'triangle',
          rotation: 180, order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { type: 'time', time: { unit: 'month', displayFormats: { month: 'yyyy-MM' } }, grid: { display: false } },
        y: { title: { display: true, text: '价格 (元)' }, grid: { color: 'rgba(0,0,0,0.05)' } }
      },
      plugins: {
        title: { display: true, text: `${stockName}  MA(${shortW},${longW})`, font: { size: 14 }, padding: 10 },
        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, padding: 15, font: { size: 11 } } },
        zoom: {
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
          pan: { enabled: true, mode: 'x' }
        },
        tooltip: { mode: 'index' }
      }
    },
    plugins: [holdingBgPlugin]
  });
}

function renderDrawdownChart(data, stratResult, bhResult, stockName) {
  const dates = data.map(d => parseDate(d.date));

  function calcDD(equity) {
    const dd = new Array(equity.length);
    let peak = equity[0];
    for (let i = 0; i < equity.length; i++) {
      if (equity[i] > peak) peak = equity[i];
      dd[i] = ((equity[i] - peak) / peak) * 100;
    }
    return dd;
  }

  const stratDD = calcDD(stratResult.equity);
  const bhDD = calcDD(bhResult.bhEquity);

  const ctx = document.getElementById('drawdownChart').getContext('2d');
  ddChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.date),
      datasets: [
        { label: '策略回撤', data: stratDD, borderColor: COLORS.red, backgroundColor: 'rgba(231,76,60,0.15)', borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.1 },
        { label: '买入持有回撤', data: bhDD, borderColor: COLORS.blue, borderWidth: 1.2, pointRadius: 0, borderDash: [5, 3], fill: false, tension: 0.1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { type: 'time', time: { unit: 'month', displayFormats: { month: 'yyyy-MM' } }, grid: { display: false } },
        y: { title: { display: true, text: '回撤 (%)' }, grid: { color: 'rgba(0,0,0,0.05)' }, max: 0 }
      },
      plugins: {
        title: { display: true, text: `${stockName}  回撤分析`, font: { size: 13 }, padding: 10 },
        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } },
        zoom: { zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }, pan: { enabled: true, mode: 'x' } }
      }
    }
  });
}

function renderMetricsTable(metrics) {
  const rows = [
    ['收益', '累计收益率 (%)', '策略_累计收益率', '买入持有_累计收益率'],
    ['收益', '年化收益率 (%)', '策略_年化收益率', '买入持有_年化收益率'],
    ['风险', '年化波动率 (%)', '策略_年化波动率', '买入持有_年化波动率'],
    ['风险', '最大回撤 (%)', '策略_最大回撤', '买入持有_最大回撤'],
    ['风险调整', '夏普比率', '策略_夏普比率', '买入持有_夏普比率'],
    ['风险调整', '卡玛比率', '策略_卡玛比率', '买入持有_卡玛比率'],
    ['风险调整', '索提诺比率', '策略_索提诺比率', '买入持有_索提诺比率'],
    ['交易', '总交易次数', '交易_总次数', null],
    ['交易', '胜率 (%)', '交易_胜率', null],
    ['交易', '平均盈利 (%)', '交易_平均盈利(%)', null],
    ['交易', '平均亏损 (%)', '交易_平均亏损(%)', null],
    ['交易', '盈亏比', '交易_盈亏比', null],
    ['交易', '平均持仓天数', '交易_平均持仓天数', null],
    ['交易', '累计盈亏 (元)', '交易_累计盈亏(元)', null],
  ];

  let html = '<table class="metrics-table"><tr><th>类别</th><th>指标</th><th>双均线策略</th><th>买入持有</th></tr>';
  for (const [cat, name, sk, bk] of rows) {
    const sv = metrics[sk] != null ? metrics[sk] : '—';
    const bv = bk ? (metrics[bk] != null ? metrics[bk] : '—') : '—';
    const sf = typeof sv === 'number' ? fmtNum(sv) : sv;
    const bf = typeof bv === 'number' ? fmtNum(bv) : bv;

    // Color winner (for comparable metrics)
    let sClass = '', bClass = '';
    if (bk && typeof sv === 'number' && typeof bv === 'number') {
      const catLower = cat;
      const isBetter = (catLower === '风险' || name.includes('回撤') || name.includes('波动'))
        ? sv < bv  // lower risk is better
        : sv > bv; // higher return is better
      if (isBetter) { sClass = 's-better'; bClass = 'bh-better'; }
      else { sClass = 'bh-better'; bClass = 's-better'; }
    }

    if (bk) {
      html += `<tr><td class="cat-cell">${cat}</td><td>${name}</td><td class="${sClass}">${sf}</td><td class="${bClass}">${bf}</td></tr>`;
    } else {
      html += `<tr><td class="cat-cell">${cat}</td><td>${name}</td><td colspan="2" style="text-align:center">${sf}</td></tr>`;
    }
  }
  html += '</table>';
  document.getElementById('metricsTable').innerHTML = html;
}

function renderTradesTable(trades) {
  if (!trades || trades.length === 0) {
    document.getElementById('tradesTable').innerHTML = '<p style="color:#999;font-size:13px;">无交易记录</p>';
    return;
  }

  let html = '<table class="trades-table"><tr><th>#</th><th>入场日期</th><th>出场日期</th><th>持仓天</th><th>盈亏%</th><th>结果</th></tr>';
  trades.forEach((t, i) => {
    const cls = t.isWin ? 'win-row' : 'loss-row';
    const resultText = t.isWin ? '盈利' : '亏损';
    html += `<tr class="${cls}"><td>${i + 1}</td><td>${t.entryDate}</td><td>${t.exitDate}</td><td>${t.holdingDays}</td><td>${t.pnlPct.toFixed(2)}%</td><td>${resultText}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('tradesTable').innerHTML = html;
}

function updateStatusBar(metrics, trades) {
  document.getElementById('statRet').textContent = fmtNum(metrics['策略_累计收益率']) + '%';
  document.getElementById('statDD').textContent = fmtNum(metrics['策略_最大回撤']) + '%';
  document.getElementById('statSharpe').textContent = fmtNum(metrics['策略_夏普比率']);
  document.getElementById('statWin').textContent = metrics['交易_胜率'] != null ? fmtNum(metrics['交易_胜率']) + '%' : '—';
  document.getElementById('statTrades').textContent = trades ? trades.length : 0;
}

// ============================================================
// MAIN
// ============================================================
function runBacktest() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '计算中...';

  // Use setTimeout to let the UI update before heavy computation
  setTimeout(() => {
    try {
      const stockName = document.getElementById('stockSelect').value;
      const shortW = parseInt(document.getElementById('shortMA').value);
      const longW = parseInt(document.getElementById('longMA').value);
      const posRatio = parseInt(document.getElementById('positionRatio').value) / 100;
      const commission = parseInt(document.getElementById('commission').value) / 10000;
      const slippage = parseInt(document.getElementById('slippage').value) / 10000;
      const limitFilter = document.getElementById('limitFilter').checked;
      const capital = 100000;

      if (shortW >= longW) {
        alert(`参数错误：短期 MA(${shortW}) 必须小于长期 MA(${longW})`);
        btn.disabled = false; btn.textContent = '运行回测';
        return;
      }

      const stockData = STOCK_DATA[stockName];
      if (!stockData) {
        alert('找不到股票数据');
        btn.disabled = false; btn.textContent = '运行回测';
        return;
      }

      const data = stockData.data;
      document.getElementById('stockInfo').textContent =
        `数据范围: ${data[0].date} ~ ${data[data.length - 1].date} · ${data.length} 交易日`;

      // Compute
      const strat = computeStrategy(data, shortW, longW);
      const bhResult = simulateBuyHold(data, capital, posRatio);
      const stratResult = simulateTrading(data, strat, {
        initialCapital: capital, commission, slippage, limitFilter, positionRatio: posRatio
      });

      const gcCount = strat.goldenCross.reduce((a, b) => a + b, 0);
      const dcCount = strat.deathCross.reduce((a, b) => a + b, 0);

      document.getElementById('mainChartTitle').textContent =
        `价格走势 & 交易信号 — 金叉: ${gcCount} 次 | 死叉: ${dcCount} 次 | 交易: ${stratResult.trades.length} 笔`;

      const metrics = computeMetrics(stratResult, bhResult, stratResult.trades);

      // Render
      destroyCharts();
      renderMainChart(data, strat, stockName, shortW, longW);
      renderEquityChart(data, stratResult, bhResult, stockName);
      renderDrawdownChart(data, stratResult, bhResult, stockName);
      renderMetricsTable(metrics);
      renderTradesTable(stratResult.trades);
      updateStatusBar(metrics, stratResult.trades);

      btn.disabled = false;
      btn.textContent = '运行回测';
    } catch (e) {
      console.error(e);
      alert('运行出错: ' + e.message);
      btn.disabled = false;
      btn.textContent = '运行回测';
    }
  }, 50);
}

function init() {
  // Populate stock dropdown
  const select = document.getElementById('stockSelect');
  const names = Object.keys(STOCK_DATA);
  names.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });

  // Slider value displays
  function bindSlider(id, valId, fmt) {
    const slider = document.getElementById(id);
    const valEl = document.getElementById(valId);
    slider.addEventListener('input', () => { valEl.textContent = fmt(slider.value); });
  }
  bindSlider('shortMA', 'shortVal', v => v);
  bindSlider('longMA', 'longVal', v => v);
  bindSlider('positionRatio', 'posVal', v => v + '%');
  bindSlider('commission', 'feeVal', v => (v / 100).toFixed(2) + '%');
  bindSlider('slippage', 'slipVal', v => (v / 100).toFixed(2) + '%');

  // Initial run
  runBacktest();
}

document.addEventListener('DOMContentLoaded', init);
