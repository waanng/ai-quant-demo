<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双均线策略交互看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #0d1117; color: #c9d1d9; display: flex;
            min-height: 100vh;
        }
        /* 左侧边栏 */
        .sidebar {
            width: 220px; min-width: 220px; background: #161b22;
            border-right: 1px solid #30363d; padding: 16px;
            display: flex; flex-direction: column; gap: 16px;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 15px; font-weight: 700; color: #58a6ff;
            padding-bottom: 10px; border-bottom: 1px solid #30363d;
        }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-label {
            font-size: 12px; color: #8b949e; display: flex;
            justify-content: space-between; align-items: center;
        }
        .control-label .value { color: #58a6ff; font-weight: 600; font-family: 'Consolas', monospace; }
        .variety-btn {
            padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
            background: #21262d; color: #8b949e; border: 1px solid #30363d;
            transition: all 0.2s; text-align: left;
        }
        .variety-btn:hover { background: #30363d; color: #c9d1d9; }
        .variety-btn.active {
            background: #1f6feb33; border-color: #58a6ff; color: #58a6ff;
        }
        input[type="range"] {
            width: 100%; height: 4px; background: #30363d; border-radius: 2px;
            -webkit-appearance: none; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #58a6ff; cursor: pointer;
        }
        .reset-btn {
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
            background: #21262d; color: #8b949e; border: 1px solid #30363d;
            font-weight: 600; text-align: center; transition: all 0.2s;
        }
        .reset-btn:hover { background: #30363d; color: #c9d1d9; }
        .hint { font-size: 11px; color: #6e7681; line-height: 1.5; }
        .live-tag {
            display: inline-block; background: #1f6feb33; color: #58a6ff;
            font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 4px;
        }
        /* 右侧主区 */
        .main-area { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .header {
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
        .header .subtitle { font-size: 11px; color: #6e7681; margin-top: 2px; }
        .metrics-bar {
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 8px 16px; display: flex; gap: 24px; flex-wrap: wrap; font-size: 12px;
        }
        .metric-item { display: flex; align-items: center; gap: 4px; }
        .metric-item .label { color: #6e7681; }
        .metric-item .val { color: #58a6ff; font-weight: 600; font-family: 'Consolas', monospace; }
        .metric-item .val.pos { color: #f85149; }
        .metric-item .val.neg { color: #3fb950; }
        .chart-box {
            background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .chart-box-title {
            background: #161b22; padding: 6px 16px; border-bottom: 1px solid #30363d;
            font-size: 13px; font-weight: 600; color: #c9d1d9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .legend-tags { display: flex; gap: 12px; font-size: 11px; font-weight: 400; }
        .legend-tag { display: flex; align-items: center; gap: 3px; color: #8b949e; }
        .legend-dot { width: 12px; height: 2px; border-radius: 1px; }
        #mainChart { width: 100%; height: 400px; }
        #equityChart { width: 100%; height: 180px; }
        /* 寻优热力图 */
        .heatmap-box {
            background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
            overflow: hidden;
        }
        .heatmap-title {
            background: #161b22; padding: 6px 16px; border-bottom: 1px solid #30363d;
            font-size: 13px; font-weight: 600; color: #c9d1d9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .heatmap-toggle { display: flex; gap: 4px; }
        .toggle-btn {
            padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
            background: #21262d; color: #8b949e; border: 1px solid #30363d;
        }
        .toggle-btn.active { background: #1f6feb33; border-color: #58a6ff; color: #58a6ff; }
        .heatmap-container { padding: 10px; overflow-x: auto; }
        .heatmap-table { border-collapse: collapse; font-size: 11px; font-family: 'Consolas', monospace; }
        .heatmap-table th { padding: 4px 8px; color: #6e7681; font-weight: 600; text-align: center; }
        .heatmap-table td {
            padding: 5px 8px; text-align: center; cursor: pointer; border: 1px solid #21262d;
            min-width: 56px; transition: transform 0.1s;
        }
        .heatmap-table td:hover { transform: scale(1.1); z-index: 10; border-color: #58a6ff; }
        .heatmap-table td.current { border: 2px solid #58a6ff; }
        .heatmap-table td.invalid { background: #0d1117; cursor: default; color: #21262d; }
        .heatmap-table td.invalid:hover { transform: none; border-color: #21262d; }
        .best-badge { font-size: 9px; color: #d29922; }
        .footer { text-align: center; padding: 8px; color: #484f58; font-size: 11px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-title">双均线策略控制台</div>

        <div class="control-group">
            <div class="control-label">品种选择</div>
            <div id="varietySelector" style="display:flex;flex-direction:column;gap:5px;"></div>
        </div>

        <div class="control-group">
            <div class="control-label">
                <span>快线周期 (MA Fast)</span>
                <span class="value" id="fastVal">10</span>
            </div>
            <input type="range" id="fastSlider" min="2" max="30" value="10" step="1">
        </div>

        <div class="control-group">
            <div class="control-label">
                <span>慢线周期 (MA Slow)</span>
                <span class="value" id="slowVal">20</span>
            </div>
            <input type="range" id="slowSlider" min="5" max="60" value="20" step="1">
        </div>

        <div class="reset-btn" id="resetBtn">重置默认参数</div>

        <div class="hint">
            <span class="live-tag">实时联动</span>拖动滑块即刷新<br>
            金叉→平空开多 / 死叉→平多开空<br>
            下方热力图可点击切换参数<br>
            全可逆策略，MA生效后全程持仓
        </div>
    </div>

    <div class="main-area">
        <div class="header">
            <div>
                <h1 id="title">双均线策略交互看板</h1>
                <div class="subtitle" id="subtitle">数据来源: AKShare 期货主力连续合约 | 仅供学习参考</div>
            </div>
        </div>

        <div class="metrics-bar" id="metricsBar"></div>

        <div class="chart-box" style="flex:1;">
            <div class="chart-box-title">
                <span>K线 + 双均线 + 开平仓信号</span>
                <div class="legend-tags">
                    <div class="legend-tag"><div class="legend-dot" style="background:#ffa502;"></div>快线 MA</div>
                    <div class="legend-tag"><div class="legend-dot" style="background:#58a6ff;"></div>慢线 MA</div>
                    <div class="legend-tag"><div class="legend-dot" style="background:#f85149;width:8px;height:8px;border-radius:50%;"></div>金叉开多</div>
                    <div class="legend-tag"><div class="legend-dot" style="background:#3fb950;width:8px;height:8px;border-radius:50%;"></div>死叉开空</div>
                </div>
            </div>
            <div id="mainChart"></div>
        </div>

        <div class="chart-box">
            <div class="chart-box-title">
                <span>策略净值 vs 标的净值</span>
                <div class="legend-tags">
                    <div class="legend-tag"><div class="legend-dot" style="background:#58a6ff;"></div>策略净值</div>
                    <div class="legend-tag"><div class="legend-dot" style="background:#6e7681;"></div>标的净值</div>
                </div>
            </div>
            <div id="equityChart"></div>
        </div>

        <div class="heatmap-box">
            <div class="heatmap-title">
                <span>参数寻优热力图（点击单元格应用参数）</span>
                <div class="heatmap-toggle">
                    <div class="toggle-btn active" id="toggleCum" onclick="switchHeatmap('cum')">累计回报</div>
                    <div class="toggle-btn" id="toggleSharpe" onclick="switchHeatmap('sharpe')">夏普比率</div>
                </div>
            </div>
            <div class="heatmap-container">
                <table class="heatmap-table" id="heatmapTable"></table>
            </div>
        </div>

        <div class="footer">北大光华量化交易课程 · 双均线策略 | 数据来源: AKShare | 仅供学习参考</div>
    </div>

        function calcMA(closeArr, period) {
            const result = new Array(closeArr.length).fill(null);
            for (let i = period - 1; i < closeArr.length; i++) {
                let sum = 0;
                for (let j = 0; j < period; j++) sum += closeArr[i - j];

                    positions[i] = 0;

                }
                if (i > 0 && maFast[i - 1] !== null && maSlow[i - 1] !== null) {
                    if (maFast[i] > maSlow[i] && maFast[i - 1] <= maSlow[i - 1]) {
                        position = 1;
                        signals.push({idx: i, type: 'golden', action: '平空开多'});

                    else if (maFast[i] < maSlow[i] && maFast[i - 1] >= maSlow[i - 1]) {

                const prevPos = positions[i - 1] || 0;
                const stratRet = prevPos * pct;

                buyHold.push(buyHold[i - 1] * (1 + pct));

            const vMax = Math.max(...allVals);
            const vAbsMax = Math.max(Math.abs(vMin), Math.abs(vMax));

            let html = '<tr><th>快 \ 慢</th>';
            slowGrid.forEach(s => { html += '<th>' + s + '</th>'; });
            html += '</tr>';

            for (let fi = 0; fi < fastGrid.length; fi++) {
                html += '<tr><th>' + fastGrid[fi] + '</th>';
                for (let si = 0; si < slowGrid.length; si++) {
                    const val = grid[fi][si];
                    if (val === null) {
                        html += '<td class="invalid">-</td>';
                    } else {
                        const ratio = vAbsMax > 0 ? Math.abs(val) / vAbsMax : 0;
                        const alpha = 0.15 + ratio * 0.55;
                        let color;
                        if (heatmapMode === 'cum') {
                            color = val >= 0 ? `rgba(248,81,73,${alpha})` : `rgba(63,185,80,${alpha})`;
                        } else {
                            color = val >= 1 ? `rgba(248,81,73,${alpha})` : (val >= 0 ? `rgba(210,153,34,${alpha * 0.8})` : `rgba(63,185,80,${alpha})`);
                        }
                        const isCurrent = (fastGrid[fi] === currentFast && slowGrid[si] === currentSlow);
                        const isBest = (fi === bestFi && si === bestSi);
                        const valStr = heatmapMode === 'cum' ? (val >= 0 ? '+' : '') + val.toFixed(1) + '%' : val.toFixed(2);
                        const badge = isBest ? '<br><span class="best-badge">BEST</span>' : '';
                        html += `<td class="${isCurrent ? 'current' : ''}" style="background:${color}" onclick="applyParam(${fastGrid[fi]},${slowGrid[si]})">${valStr}${badge}</td>`;
                    }
                }
                html += '</tr>';
            }
            table.innerHTML = html;
        }

        function switchHeatmap(mode) {
            heatmapMode = mode;
            document.getElementById('toggleCum').classList.toggle('active', mode === 'cum');
            document.getElementById('toggleSharpe').classList.toggle('active', mode === 'sharpe');
            renderHeatmap();
        }

        function applyParam(fast, slow) {
            currentFast = fast;
            currentSlow = slow;
            document.getElementById('fastSlider').value = fast;
            document.getElementById('slowSlider').value = slow;
            document.getElementById('fastVal').textContent = fast;
            document.getElementById('slowVal').textContent = slow;
            renderAll();
        }

        // ========== 渲染函数 ==========

        function initVarietySelector() {
            const container = document.getElementById('varietySelector');
            container.innerHTML = '';
            stockList.forEach((s, i) => {
                const btn = document.createElement('div');
                btn.className = 'variety-btn' + (i === 0 ? ' active' : '');
                btn.textContent = s.name + '(' + s.symbol + ')';
                btn.onclick = () => {
                    document.querySelectorAll('.variety-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentVariety = s.name;
                    renderAll();
                    renderHeatmap();
                };
                container.appendChild(btn);
            });
        }

        function renderAll() {
            const data = allData[currentVariety];
            if (!data) return;
            if (currentFast >= currentSlow) {
                document.getElementById('metricsBar').innerHTML = '<div class="metric-item" style="color:#f85149">快线周期必须小于慢线周期！</div>';
                return;
            }

            const fast = currentFast;
            const slow = currentSlow;
            const maFast = calcMA(data.close, fast);
            const maSlow = calcMA(data.close, slow);
            const {signals, positions} = generateSignals(maFast, maSlow);
            const {equity, buyHold} = calcEquity(data.close, positions);

            // 更新标题
            document.getElementById('title').textContent =
                currentVariety + '(' + allData[currentVariety].symbol + ') 双均线(' + fast + ',' + slow + ') 策略';
            document.getElementById('subtitle').textContent =
                'K线: ' + data.dates.length + ' 根 | 区间: ' + data.dates[0] + ' ~ ' + data.dates[data.dates.length - 1];

            // 更新指标条
            const m = calcMetrics(data.close, positions);
            const retColor = parseFloat(m.cumRet) >= 0 ? 'pos' : 'neg';
            document.getElementById('metricsBar').innerHTML = `
                <div class="metric-item"><span class="label">累计回报:</span><span class="val ${retColor}">${m.cumRet}%</span></div>
                <div class="metric-item"><span class="label">年化收益:</span><span class="val ${retColor}">${m.annRet}%</span></div>
                <div class="metric-item"><span class="label">最大回撤:</span><span class="val neg">-${m.maxDD}%</span></div>
                <div class="metric-item"><span class="label">夏普比率:</span><span class="val">${m.sharpe}</span></div>
                <div class="metric-item"><span class="label">交易次数:</span><span class="val">${m.trades}</span></div>
            `;

            renderMainChart(data, maFast, maSlow, signals);
            renderEquityChart(data, equity, buyHold);
            renderHeatmap();
        }

        function renderMainChart(data, maFast, maSlow, signals) {
            if (!mainChart) mainChart = echarts.init(document.getElementById('mainChart'));
            const upColor = '#f85149', downColor = '#3fb950';

            const markPoints = signals.map(sig => {
                const kline = data.kline[sig.idx];
                const isGolden = sig.type === 'golden';
                return {
                    coord: [data.dates[sig.idx], kline[2]],
                    symbol: 'triangle', symbolSize: 12,
                    symbolRotate: isGolden ? 0 : 180,
                    itemStyle: { color: isGolden ? '#f85149' : '#3fb950' },
                    label: { show: true, formatter: sig.action, fontSize: 9,
                        color: isGolden ? '#f85149' : '#3fb950',
                        position: isGolden ? 'bottom' : 'top', distance: 8 }
                };
            });

            mainChart.setOption({
                backgroundColor: '#0d1117', animation: false,
                tooltip: {
                    trigger: 'axis', axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(22,27,34,0.95)', borderColor: '#30363d',
                    textStyle: { color: '#c9d1d9', fontSize: 12 },
                    formatter: function(params) {
                        if (!params || params.length === 0) return '';
                        let html = '<div style="font-weight:600;margin-bottom:4px;">' + params[0].axisValue + '</div>';
                        params.forEach(p => {
                            if (p.seriesName === 'K线') {
                                const d = p.data;
                                if (Array.isArray(d) && d.length >= 4) {
                                    const chg = d[1] - d[0];
                                    const pct = d[0] > 0 ? (chg / d[0] * 100).toFixed(2) : '0';
                                    html += '<div>开:' + d[0] + ' 收:' + d[1] + '</div>';
                                    html += '<div>低:' + d[2] + ' 高:' + d[3] + '</div>';
                                    html += '<div style="color:' + (chg >= 0 ? '#f85149' : '#3fb950') + '">涨跌:' + (chg >= 0 ? '+' : '') + chg.toFixed(2) + '(' + pct + '%)</div>';
                                }
                            } else if (p.value !== null && p.value !== undefined && p.value !== '-') {
                                html += '<div><span style="color:' + p.color + '">' + p.seriesName + '</span>: ' + parseFloat(p.value).toFixed(2) + '</div>';
                            }
                        });
                        return html;
                    }
                },
                legend: { data: ['K线', 'MA' + currentFast, 'MA' + currentSlow], top: 4,
                    textStyle: { color: '#6e7681', fontSize: 11 }, itemWidth: 14, itemHeight: 8 },
                grid: { left: 60, right: 20, top: 30, bottom: 50 },
                xAxis: { type: 'category', data: data.dates, boundaryGap: true,
                    axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#6e7681', fontSize: 10 },
                    splitLine: { show: false } },
                yAxis: { scale: true, axisLine: { show: false }, axisTick: { show: false },
                    axisLabel: { color: '#6e7681', fontSize: 10, inside: true, margin: 0 },
                    splitLine: { lineStyle: { color: '#21262d', type: 'dashed' } },
                    boundaryGap: ['3%', '3%'] },
                dataZoom: [
                    { type: 'inside', start: 60, end: 100, filterMode: 'filter' },
                    { show: true, type: 'slider', bottom: 8, height: 18, start: 60, end: 100,
                       filterMode: 'filter', borderColor: '#30363d', backgroundColor: '#0d1117',
                       fillerColor: 'rgba(31,111,235,0.15)',
                       handleStyle: { color: '#58a6ff', borderColor: '#58a6ff' },
                       dataBackground: { lineStyle: { color: '#30363d' }, areaStyle: { color: '#161b22' } },
                       textStyle: { color: '#6e7681', fontSize: 10 } }
                ],
                series: [
                    { name: 'K线', type: 'candlestick', data: data.kline,
                        itemStyle: { color: upColor, color0: downColor, borderColor: upColor, borderColor0: downColor },
                        markPoint: { symbol: 'triangle', animation: false, data: markPoints } },
                    { name: 'MA' + currentFast, type: 'line', data: maFast.map(v => v ? parseFloat(v.toFixed(2)) : null),
                        symbol: 'none', lineStyle: { width: 1.5, color: '#ffa502' } },
                    { name: 'MA' + currentSlow, type: 'line', data: maSlow.map(v => v ? parseFloat(v.toFixed(2)) : null),
                        symbol: 'none', lineStyle: { width: 1.5, color: '#58a6ff' } }
                ]
            }, true);
        }

        function renderEquityChart(data, equity, buyHold) {
            if (!equityChart) equityChart = echarts.init(document.getElementById('equityChart'));
            equityChart.setOption({
                backgroundColor: '#0d1117', animation: false,
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(22,27,34,0.95)', borderColor: '#30363d',
                    textStyle: { color: '#c9d1d9', fontSize: 12 } },
                legend: { data: ['策略净值', '标的净值'], top: 4,
                    textStyle: { color: '#6e7681', fontSize: 11 }, itemWidth: 14, itemHeight: 8 },
                grid: { left: 60, right: 20, top: 30, bottom: 24 },
                xAxis: { type: 'category', data: data.dates, boundaryGap: false,
                    axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#6e7681', fontSize: 10 },
                    splitLine: { show: false } },
                yAxis: { scale: true, axisLine: { show: false }, axisTick: { show: false },
                    axisLabel: { color: '#6e7681', fontSize: 10, inside: true, margin: 0 },
                    splitLine: { lineStyle: { color: '#21262d', type: 'dashed' } } },
                dataZoom: [{ type: 'inside', start: 60, end: 100, filterMode: 'filter' }],
                series: [
                    { name: '策略净值', type: 'line', data: equity.map(v => parseFloat(v.toFixed(4))),
                        symbol: 'none', lineStyle: { width: 1.5, color: '#58a6ff' },
                        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1,
                            [{ offset: 0, color: 'rgba(88,166,255,0.2)' }, { offset: 1, color: 'rgba(88,166,255,0.01)' }]) } },
                    { name: '标的净值', type: 'line', data: buyHold.map(v => parseFloat(v.toFixed(4))),
                        symbol: 'none', lineStyle: { width: 1, color: '#6e7681', type: 'dashed' } }
                ]
            }, true);
        }

        // ========== 事件绑定（实时联动 + 防抖） ==========

        function debouncedRender() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (currentFast >= currentSlow) {
                    document.getElementById('metricsBar').innerHTML =
                        '<div class="metric-item" style="color:#f85149">快线周期(' + currentFast + ')必须小于慢线周期(' + currentSlow + ')！</div>';
                    return;
                }
                renderAll();
            }, 120);
        }

        document.getElementById('fastSlider').oninput = function() {
            currentFast = parseInt(this.value);
            document.getElementById('fastVal').textContent = currentFast;
            debouncedRender();
        };

        document.getElementById('slowSlider').oninput = function() {
            currentSlow = parseInt(this.value);
            document.getElementById('slowVal').textContent = currentSlow;
            debouncedRender();
        };

        document.getElementById('resetBtn').onclick = function() {
            currentFast = 10;
            currentSlow = 20;
            document.getElementById('fastSlider').value = currentFast;
            document.getElementById('slowSlider').value = currentSlow;
            document.getElementById('fastVal').textContent = currentFast;
            document.getElementById('slowVal').textContent = currentSlow;
            renderAll();
        };

        window.addEventListener('resize', () => {
            if (mainChart) mainChart.resize();
            if (equityChart) equityChart.resize();
        });

        // 初始化
        initVarietySelector();
        renderAll();
        echarts.connect([mainChart, equityChart]);
    </script>
</body>
</html>
