<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心技术指标交互看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #0d1117; color: #c9d1d9; padding: 8px;
        }
        .header {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; padding: 12px 20px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .header h1 {
            font-size: 18px; font-weight: 600; color: #58a6ff;
        }
        .header .subtitle { font-size: 11px; color: #6e7681; margin-top: 3px; }
        .stock-selector { display: flex; gap: 6px; flex-wrap: wrap; }
        .stock-btn {
            padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
            background: #21262d; color: #8b949e; border: 1px solid #30363d;
            transition: all 0.2s;
        }
        .stock-btn:hover { background: #30363d; color: #c9d1d9; }
        .stock-btn.active {
            background: #1f6feb33; border-color: #58a6ff; color: #58a6ff;
        }
        .info-bar {
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 8px 16px; margin-bottom: 8px;
            display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px;
        }
        .info-item { display: flex; align-items: center; gap: 4px; }
        .info-item .label { color: #6e7681; }
        .info-item .value { color: #58a6ff; font-weight: 600; font-family: 'Consolas', monospace; }
        .chart-wrapper {
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 8px; margin-bottom: 8px; overflow: hidden;
        }
        .chart-header {
            background: #161b22; padding: 8px 16px; border-bottom: 1px solid #30363d;
            font-size: 13px; font-weight: 600; color: #c9d1d9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .legend-tags { display: flex; gap: 10px; font-size: 11px; font-weight: 400; }
        .legend-tag { display: flex; align-items: center; gap: 3px; color: #8b949e; }
        .legend-dot { width: 12px; height: 2px; border-radius: 1px; }
        #mainChart { width: 100%; height: 560px; }
        #kdjChart { width: 100%; height: 200px; }
        #rsiChart { width: 100%; height: 200px; }
        .footer { text-align: center; padding: 12px; color: #484f58; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>核心技术指标交互看板</h1>
            <div class="subtitle">K线 + 布林带(BOLL) + 江恩中期趋势线 | 成交量 | KDJ | RSI</div>
        </div>
        <div class="stock-selector" id="stockSelector"></div>
    </div>
    <div class="info-bar" id="infoBar"></div>

    <div class="chart-wrapper">
        <div class="chart-header">
            <span>主图：K线 + BOLL布林带 + 江恩中期趋势线 + 成交量</span>
            <div class="legend-tags">
                <div class="legend-tag"><div class="legend-dot" style="background:#f85149;"></div>UP</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#3fb950;"></div>DOWN</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#d29922;"></div>BOLL上轨</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#58a6ff;"></div>BOLL中轨</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#3fb950;"></div>BOLL下轨</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#bc8cff;"></div>MA5</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#ffa657;width:12px;height:2px;"></div>中期趋势线</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#f85149;width:8px;height:8px;border-radius:50%;"></div>中期头部</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#3fb950;width:8px;height:8px;border-radius:50%;"></div>中期底部</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#ff6b6b;width:10px;height:10px;border-radius:50%;"></div>买入</div>
                <div class="legend-tag"><div class="legend-dot" style="background:#4ecdc4;width:10px;height:10px;border-radius:50%;"></div>卖出</div>
            </div>
        </div>
        <div id="mainChart"></div>
    </div>

    <div class="chart-wrapper">
        <div class="chart-header">
            <span>副图：KDJ 随机震荡指标 (9,3,3)</span>
            <div class="legend-tags">

                <div class="legend-tag"><div class="legend-dot" style="background:#bc8cff;"></div>J</div>
            </div>
        </div>
        <div id="kdjChart"></div>
    </div>

    <div class="chart-wrapper">
        <div class="chart-header">

            <div class="legend-tags">
                <div class="legend-tag"><div class="legend-dot" style="background:#f85149;"></div>RSI</div>

            </div>
        </div>
        <div id="rsiChart"></div>
    </div>

                    splitLine: { lineStyle: { color: '#21262d', type: 'dashed' } } },
                dataZoom: [{ type: 'inside', start: 60, end: 100, filterMode: 'filter' }],
                series: [
                    { name: 'RSI', type: 'line', data: data.rsi, symbol: 'none',
                       lineStyle: { width: 1.2, color: '#f85149' },
                       areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1,
                           [{ offset: 0, color: 'rgba(248,81,73,0.25)' }, { offset: 1, color: 'rgba(248,81,73,0.01)' }]) }
                    },
                    { name: '超买线', type: 'line', data: data.dates.map(() => 70), symbol: 'none',
                       lineStyle: { width: 0.8, color: 'rgba(248,81,73,0.3)', type: 'dashed' }, silent: true },
                    { name: '超卖线', type: 'line', data: data.dates.map(() => 30), symbol: 'none',
                       lineStyle: { width: 0.8, color: 'rgba(63,185,80,0.3)', type: 'dashed' }, silent: true },
                    { name: '中轴线', type: 'line', data: data.dates.map(() => 50), symbol: 'none',
                       lineStyle: { width: 0.5, color: 'rgba(255,255,255,0.08)' }, silent: true }
                ]
            }, true);
        }

        function syncCharts() {
            echarts.connect([mainChart, kdjChart, rsiChart]);
        }

        window.addEventListener('resize', () => {
            if (mainChart) mainChart.resize();
            if (kdjChart) kdjChart.resize();
            if (rsiChart) rsiChart.resize();
        });

        initStockSelector();
        renderCharts();
        syncCharts();
    </script>
</body>
</html>
