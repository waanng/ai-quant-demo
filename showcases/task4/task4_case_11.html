<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海龟策略回测看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f5f5f5;color:#333;font-size:13px}
.app{max-width:1200px;margin:0 auto;padding:12px}
.header{display:flex;align-items:center;gap:8px;padding:10px 0 8px;border-bottom:1px solid #e0e0e0;margin-bottom:12px}
.header h1{font-size:18px;font-weight:500;color:#a32d2d}
.header span{margin-left:auto;font-size:12px;color:#999}
.main{display:grid;grid-template-columns:280px 1fr;gap:12px}
.panel{background:#fff;border-radius:8px;padding:10px;border:1px solid #eee;margin-bottom:10px}
.panel-title{font-size:12px;font-weight:500;color:#666;margin-bottom:6px}
.panel select,.panel input[type=number]{width:100%;padding:5px 7px;font-size:12px;border:1px solid #ddd;border-radius:5px;outline:none}
.panel select:focus,.panel input:focus{border-color:#a32d2d}
.slider-row{margin-bottom:6px}
.slider-row .label{display:flex;justify-content:space-between;font-size:11px;color:#666}
.slider-row input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:#ddd;border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#a32d2d;cursor:pointer}
.radio-group{display:flex;gap:6px;margin-bottom:6px}
.radio-group label{flex:1;display:flex;align-items:center;gap:3px;font-size:11px;background:#f9f9f9;padding:5px 6px;border-radius:5px;border:1px solid #ddd;cursor:pointer}
.radio-group label input[type=radio]{accent-color:#a32d2d}
.btn-run{width:100%;padding:9px;background:#a32d2d;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer}
.btn-run:hover{background:#8a2626}
.btn-run:disabled{opacity:0.6;cursor:not-allowed}
.shortcut{font-size:11px;color:#bbb;text-align:center;padding:4px 0}
.metrics-row1{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.metrics-row2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.metric-card{background:#fff;border-radius:6px;padding:10px;text-align:center;border:1px solid #eee}
.metric-card .label{font-size:11px;color:#999}
.metric-card .value{font-size:20px;font-weight:500;margin-top:2px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.chart-box{background:#fff;border-radius:8px;padding:8px;border:1px solid #eee}
.chart-box .title{font-size:12px;font-weight:500;color:#333;margin-bottom:4px}
.chart-box .chart-container{width:100%;height:220px}
.trade-table{background:#fff;border-radius:8px;border:1px solid #eee;overflow-x:auto}
.trade-table .header-row{display:flex;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #eee}
.trade-table .header-row span{font-size:12px;font-weight:500}
.trade-table table{width:100%;border-collapse:collapse;font-size:11px}
.trade-table th,.trade-table td{padding:3px 8px;text-align:left;border-bottom:1px solid #f0f0f0}
.trade-table th{font-weight:500;color:#666;background:#fafafa}
.up{color:#a32d2d}.down{color:#3b6d11}
.footer{margin-top:8px;padding:6px 10px;background:#f0f0f0;border-radius:6px;font-size:11px;color:#999;display:flex;gap:12px}
#loading{display:none;text-align:center;padding:10px;color:#999;font-size:12px}
.error-msg{color:#a32d2d;font-size:12px;text-align:center;padding:8px;display:none}
</style>
</head>
<body>
<div class="app">
<div class="header"><h1>🐢 海龟策略回测看板</h1><span>v2.0 · 独立版</span></div>
<div class="main">
<div>
<div class="panel">
<div class="panel-title">股票选择</div>
<select id="stock">
<option value="兆易创新" >兆易创新</option>
<option value="贵州茅台" >贵州茅台</option>
<option value="中国平安" >中国平安</option>
<option value="宁德时代" selected>宁德时代</option>
<option value="隆基绿能" >隆基绿能</option>
</select></div>
<div class="panel">
<div class="panel-title">回测时间</div>
<div style="display:flex;gap:6px;font-size:11px">
<div style="flex:1"><label style="color:#999">起始</label><br><input type="date" id="startDate" value="2022-01-04"></div>
<div style="flex:1"><label style="color:#999">截止</label><br><input type="date" id="endDate" value="2026-07-09"></div>
</div></div>
<div class="panel">
<div class="panel-title">策略参数</div>
<div class="slider-row"><div class="label"><span>入场通道周期</span><span id="v_entry">20</span></div><input type="range" id="entryWindow" min="5" max="120" value="20" oninput="v_entry.textContent=this.value"></div>
<div class="slider-row"><div class="label"><span>退出通道周期</span><span id="v_exit">10</span></div><input type="range" id="exitWindow" min="5" max="60" value="10" oninput="v_exit.textContent=this.value"></div>
<div class="slider-row"><div class="label"><span>ATR 周期</span><span id="v_atr">20</span></div><input type="range" id="atrPeriod" min="5" max="60" value="20" oninput="v_atr.textContent=this.value"></div>
<div class="slider-row"><div class="label"><span>风险比例</span><span id="v_risk">1.0%</span></div><input type="range" id="riskPct" min="0.5" max="3" step="0.1" value="1.0" oninput="v_risk.textContent=this.value+'%'"></div>
<div class="slider-row"><div class="label"><span>最大持仓单位</span><span id="v_units">4</span></div><input type="range" id="maxUnits" min="1" max="8" value="4" oninput="v_units.textContent=this.value"></div>
<div class="slider-row"><div class="label"><span>加仓步长 (×N)</span><span id="v_step">0.5</span></div><input type="range" id="addStep" min="0.25" max="1.0" step="0.05" value="0.5" oninput="v_step.textContent=this.value"></div>
</div>
<div class="panel">
<div class="panel-title">系统与资金</div>
<div class="radio-group">
<label><input type="radio" name="system" value="S1" checked> S1 (20×10)</label>
<label><input type="radio" name="system" value="S2"> S2 (55×20)</label>
</div>
<div style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px"><span>初始资金</span><input type="number" id="initialCapital" value="1000000" style="flex:1"></div>
</div>
<button class="btn-run" id="runBtn" onclick="runBacktest()">▶ 运行回测</button>
<div class="shortcut">回车运行 · Ctrl+Enter 快速对比</div>
</div>

<div>
<div id="loading">⏳ 计算中...</div>
<div id="errorMsg" class="error-msg"></div>
<div id="metricsArea">
<div class="metrics-row1">
<div class="metric-card"><div class="label">年化收益率</div><div class="value" id="m_annual" style="color:#a32d2d">--</div></div>
<div class="metric-card"><div class="label">夏普比率</div><div class="value" id="m_sharpe" style="color:#534ab7">--</div></div>
<div class="metric-card"><div class="label">最大回撤</div><div class="value" id="m_dd" style="color:#3b6d11">--</div></div>
<div class="metric-card"><div class="label">胜率</div><div class="value" id="m_winrate" style="color:#185fa5">--</div></div>
</div>
<div class="metrics-row2">
<div class="metric-card"><div class="label">交易笔数</div><div class="value" id="m_trades" style="color:#444">--</div></div>
<div class="metric-card"><div class="label">止损次数</div><div class="value" id="m_stops" style="color:#d4537e">--</div></div>
<div class="metric-card"><div class="label">平均持仓单位</div><div class="value" id="m_avgUnits" style="color:#444">--</div></div>
</div>
</div>

<div class="charts">
<div class="chart-box"><div class="title">权益曲线</div><div id="chart1" class="chart-container"></div></div>
<div class="chart-box"><div class="title">价格通道与交易信号</div><div id="chart2" class="chart-container"></div></div>
<div class="chart-box"><div class="title">Wilder ATR 走势</div><div id="chart3" class="chart-container"></div></div>
<div class="chart-box"><div class="title">持仓单位变化</div><div id="chart4" class="chart-container"></div></div>
</div>

<div class="trade-table">
<div class="header-row"><span>交易记录</span><span id="tradeCount">共 -- 笔</span></div>
<table><thead><tr><th>入场日期</th><th style="text-align:right">入场价</th><th>退出日期</th><th style="text-align:right">盈亏</th><th style="text-align:right">盈亏%</th><th style="text-align:center">原因</th></tr></thead><tbody id="tradeBody"></tbody></table>
</div>
<div class="footer"><span id="footerInfo">就绪</span><span style="margin-left:auto" id="footerParams"></span></div>
</div></div></div>

// ================== 海龟引擎 (JS 版) ==================
function calcTrueRange(high, low, prevClose, i) {
  const h = high[i], l = low[i], pc = prevClose[i];
  return Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
}

function calcNValue(trueRange, period) {
  const n = trueRange.length;
  const result = new Array(n).fill(null);
  let sum = 0;
  for (let i = 0; i < period && i < n; i++) {
    if (trueRange[i] !== null) sum += trueRange[i];
  }
  if (n >= period) {
    result[period - 1] = sum / period;
    for (let i = period; i < n; i++) {
      result[i] = (result[i - 1] * (period - 1) + trueRange[i]) / period;
    }
  }
  return result;
}

function donchianHigh(high, window) {
  const n = high.length;
  const result = new Array(n).fill(null);
  for (let i = window; i < n; i++) {
    let maxVal = -Infinity;
    for (let j = i - window; j < i; j++) {
      if (high[j] > maxVal) maxVal = high[j];
    }
    result[i] = maxVal;
  }
  return result;
}

function donchianLow(low, window) {
  const n = low.length;
  const result = new Array(n).fill(null);
  for (let i = window; i < n; i++) {
    let minVal = Infinity;
    for (let j = i - window; j < i; j++) {
      if (low[j] < minVal) minVal = low[j];
    }
    result[i] = minVal;
  }
  return result;
}

function runTurtleBacktest(params) {
  const stockData = STOCK_DATA[params.stock];
  if (!stockData) return {error: '股票数据不存在'};

  // 时间过滤
  const startDate = params.startDate;
  const endDate = params.endDate;
  const filtered = stockData.filter(r => r[0] >= startDate && r[0] <= endDate);
  if (filtered.length < 60) return {error: '数据不足'};

  const n = filtered.length;
  const dates = filtered.map(r => r[0]);
  const open = filtered.map(r => r[1]);
  const high = filtered.map(r => r[2]);
  const low = filtered.map(r => r[3]);
  const close = filtered.map(r => r[4]);

  // 策略参数
  const entryWindow = params.entryWindow;
  const exitWindow = params.exitWindow;
  const atrPeriod = params.atrPeriod;
  const riskPct = params.riskPct;
  const maxUnits = params.maxUnits;
  const addStep = params.addStep;
  const initCapital = params.initialCapital;

  // 1. 计算 TR 和 N
  const prevClose = [close[0], ...close.slice(0, -1)];
  const tr = new Array(n).fill(null);
  for (let i = 0; i < n; i++) {
    tr[i] = calcTrueRange(high, low, prevClose, i);
  }
  const nValue = calcNValue(tr, atrPeriod);

  // 2. 唐奇安通道 (排除当天)
  const chHigh = donchianHigh(high, entryWindow);
  const chLow = donchianLow(low, exitWindow);

  // 3. 信号: 入场(1) / 退出(-1)
  const signals = new Array(n).fill(0);
  for (let i = 0; i < n; i++) {
    if (nValue[i] !== null && nValue[i] > 0 && chHigh[i] !== null && chLow[i] !== null) {
      if (high[i] > chHigh[i]) signals[i] = 1;
      if (low[i] < chLow[i]) signals[i] = -1;
      // 同日同时出现, 优先退出
      if (high[i] > chHigh[i] && low[i] < chLow[i]) signals[i] = -1;
    }
  }

  // ====== 4. 回测引擎 (多单位台账) ======
  let cash = initCapital;
  let units = []; // {entryPrice, stopPrice, shares, active, entryIdx}
  let nextUnitId = 0;
  const trades = [];
  const equityRecords = [];

  for (let i = 0; i < n; i++) {
    const sig = signals[i];
    const date = dates[i];
    const o = open[i], h = high[i], l = low[i], c = close[i];
    const nv = nValue[i];

    const hasData = nv !== null && nv > 0 && chHigh[i] !== null && chLow[i] !== null;

    // 当前总权益
    let activeShares = units.filter(u=>u.active).reduce((s,u)=>s+u.shares, 0);
    let posValue = activeShares * c;
    let totalEquity = cash + posValue;

    // 4a. 止损检查 (收盘价)
    if (hasData) {
      for (let u of units) {
        if (u.active && c <= u.stopPrice) {
          const sellPrice = o * (1 - 0.0001);
          const revenue = u.shares * sellPrice;
          const comm = Math.max(revenue * 0.0003, 5);
          const stamp = revenue * 0.001;
          cash += revenue - comm - stamp;
          u.active = false;
          const pnl = revenue - u.shares * u.entryPrice - u.shares * u.entryPrice * 0.0003 - comm - stamp;
          trades.push({
            entryDate: dates[u.entryIdx], entryPrice: u.entryPrice,
            exitDate: date, exitPrice: sellPrice,
            shares: u.shares, pnl: pnl, pnlPct: pnl / (u.shares * u.entryPrice) * 100,
            reason: '止损'
          });
        }
      }
    }

    // 4b. 趋势退出
    if (hasData && sig === -1) {
      for (let u of units) {
        if (u.active) {
          const sellPrice = o * (1 - 0.0001);
          const revenue = u.shares * sellPrice;
          const comm = Math.max(revenue * 0.0003, 5);
          const stamp = revenue * 0.001;
          cash += revenue - comm - stamp;
          u.active = false;
          const pnl = revenue - u.shares * u.entryPrice - u.shares * u.entryPrice * 0.0003 - comm - stamp;
          trades.push({
            entryDate: dates[u.entryIdx], entryPrice: u.entryPrice,
            exitDate: date, exitPrice: sellPrice,
            shares: u.shares, pnl: pnl, pnlPct: pnl / (u.shares * u.entryPrice) * 100,
            reason: '趋势退出'
          });
        }
      }
    }

    // 4c. 入场
    const actCount = units.filter(u=>u.active).length;
    if (hasData && actCount === 0 && sig === 1) {
      const rawShares = Math.floor((totalEquity * riskPct) / nv);
      const shares = Math.floor(rawShares / 100) * 100;
      if (shares > 0) {
        const buyPrice = o * (1 + 0.0001);
        const cost = shares * buyPrice;
        const comm = Math.max(cost * 0.0003, 5);
        if (cost + comm <= cash) {
          const stopPrice = buyPrice - 2 * nv;
          units.push({entryIdx: i, entryPrice: buyPrice, stopPrice, shares, active: true});
          nextUnitId++;
          cash -= cost + comm;
        }
      }
    }

    // 4d. 加仓
    if (hasData && actCount > 0 && actCount < maxUnits) {
      let lastEntry = null;
      for (let j = units.length - 1; j >= 0; j--) {
        if (units[j].active) { lastEntry = units[j].entryPrice; break; }
      }
      if (lastEntry !== null && h >= lastEntry + addStep * nv) {
        const rawShares = Math.floor((totalEquity * riskPct) / nv);
        const shares = Math.floor(rawShares / 100) * 100;
        if (shares > 0) {
          const buyPrice = o * (1 + 0.0001);
          const cost = shares * buyPrice;
          const comm = Math.max(cost * 0.0003, 5);
          if (cost + comm <= cash) {
            const stopPrice = buyPrice - 2 * nv;
            units.push({entryIdx: i, entryPrice: buyPrice, stopPrice, shares, active: true});
            cash -= cost + comm;
          }
        }
      }
    }

    // 记录权益
    activeShares = units.filter(u=>u.active).reduce((s,u)=>s+u.shares, 0);
    posValue = activeShares * c;
    equityRecords.push({
      date, equity: cash + posValue, activeUnits: units.filter(u=>u.active).length
    });
  }

  // 最后平仓
  const lastC = close[n-1];
  const lastDate = dates[n-1];
  for (let u of units) {
    if (u.active) {
      const revenue = u.shares * lastC;
      const comm = Math.max(revenue * 0.0003, 5);
      const stamp = revenue * 0.001;
      cash += revenue - comm - stamp;
      u.active = false;
      trades.push({
        entryDate: dates[u.entryIdx], entryPrice: u.entryPrice,
        exitDate: lastDate, exitPrice: lastC,
        shares: u.shares, pnl: revenue - u.shares * u.entryPrice - u.shares * u.entryPrice * 0.0003 - comm - stamp,
        pnlPct: (revenue - u.shares * u.entryPrice - u.shares * u.entryPrice * 0.0003 - comm - stamp) / (u.shares * u.entryPrice) * 100,
        reason: '强制平仓'
      });
    }
  }

  // ====== 5. 绩效指标 ======
  const finalEquity = equityRecords.length > 0 ? equityRecords[equityRecords.length - 1].equity : initCapital;
  const totalReturn = (finalEquity - initCapital) / initCapital;
  const nDays = equityRecords.length;
  const annualReturn = Math.pow(1 + totalReturn, 252 / Math.max(nDays, 1)) - 1;

  // 最大回撤
  let peak = -Infinity, maxDD = 0;
  for (let r of equityRecords) {
    if (r.equity > peak) peak = r.equity;
    const dd = (r.equity - peak) / peak;
    if (dd < maxDD) maxDD = dd;
  }

  // 夏普
  let dailyReturns = [0];
  for (let i = 1; i < equityRecords.length; i++) {
    dailyReturns.push((equityRecords[i].equity - equityRecords[i-1].equity) / equityRecords[i-1].equity);
  }
  const avgRet = dailyReturns.reduce((a,b)=>a+b,0) / dailyReturns.length;
  const stdRet = Math.sqrt(dailyReturns.reduce((a,b)=>a+(b-avgRet)**2,0) / dailyReturns.length) || 1;
  const rfDaily = 0.02 / 252;
  const sharpe = stdRet > 0 ? (avgRet - rfDaily) / stdRet * Math.sqrt(252) : 0;

  // 交易统计
  const totalTrades = trades.length;
  const winTrades = trades.filter(t => t.pnl > 0).length;
  const winRate = totalTrades > 0 ? winTrades / totalTrades : 0;
  const avgWin = winTrades > 0 ? trades.filter(t=>t.pnl>0).reduce((s,t)=>s+t.pnl,0)/winTrades : 0;
  const lossTrades = trades.filter(t => t.pnl <= 0);
  const avgLoss = lossTrades.length > 0 ? Math.abs(lossTrades.reduce((s,t)=>s+t.pnl,0)/lossTrades.length) : 0;
  const stopCount = trades.filter(t=>t.reason==='止损').length;
  const avgUnits = equityRecords.reduce((s,r)=>s+r.activeUnits,0) / equityRecords.length;

  return {
    metrics: {
      annualReturn: (annualReturn * 100).toFixed(2),
      sharpeRatio: sharpe.toFixed(2),
      maxDrawdown: (maxDD * 100).toFixed(2),
      winRate: (winRate * 100).toFixed(2),
      totalTrades: totalTrades,
      stopLossTrades: stopCount,
      totalReturn: (totalReturn * 100).toFixed(2),
    },
    avgUnits: avgUnits.toFixed(2),
    chartData: {
      dates, close, nValue,
      channelHigh: chHigh, channelLow: chLow,
      equity: {dates: equityRecords.map(r=>r.date), values: equityRecords.map(r=>Math.round(r.equity*100)/100)},
      buyhold: close.map(v => Math.round(v / close[0] * initCapital * 100) / 100),
      buySignals: trades.filter(t=>true).map(t=>({date:t.entryDate,price:t.entryPrice})).filter((v,i,a)=>a.findIndex(x=>x.date===v.date)===i),
      sellSignals: trades.filter(t=>t.reason!=='止损').map(t=>({date:t.exitDate,price:t.exitPrice})).filter((v,i,a)=>a.findIndex(x=>x.date===v.date)===i),
      activeUnits: equityRecords.map(r=>r.activeUnits),
      tradeRecords: trades.slice(0, 50),
    }
  };
}

  const series2 = [
    {name:'收盘价',type:'line',data:d.close.map((v,i)=>[d.dates[i],v]),lineStyle:{width:1.5,color:'#a32d2d'},showSymbol:false,smooth:true},
    {name:'通道上轨',type:'line',data:d.channelHigh.map((v,i)=>[d.dates[i],v]),lineStyle:{width:1,color:'#185fa5',type:'dashed'},showSymbol:false},
    {name:'通道下轨',type:'line',data:d.channelLow.map((v,i)=>[d.dates[i],v]),lineStyle:{width:1,color:'#185fa5',type:'dashed'},showSymbol:false},
  ];
  if(buyS.length) series2.push({name:'买入',type:'scatter',data:buyS.map(s=>[s.date,s.price]),symbol:'triangle',symbolSize:14,itemStyle:{color:'#a32d2d'}});
  if(sellS.length) series2.push({name:'卖出',type:'scatter',data:sellS.map(s=>[s.date,s.price]),symbol:'pin',symbolSize:14,itemStyle:{color:'#3b6d11'}});
  charts.chart2.setOption({
    tooltip:{trigger:'axis'}, legend:{data:['收盘价','通道上轨','通道下轨','买入','卖出'],bottom:0,textStyle:{fontSize:11}},
    grid:{left:50,right:20,bottom:35,top:10}, xAxis:{type:'category',data:d.dates,show:false},
    yAxis:{type:'value',axisLabel:{fontSize:10}}, series:series2
  });

  // 图3: ATR
  const nvData = d.nValue.map((v,i)=>[d.dates[i],v]).filter(x=>x[1]!==null);
  charts.chart3.setOption({
    tooltip:{trigger:'axis'}, grid:{left:50,right:20,bottom:25,top:10},
    xAxis:{type:'category',data:d.dates,show:false},
    yAxis:{type:'value',axisLabel:{fontSize:10},name:'N值 (元)',nameTextStyle:{fontSize:10}},
    series:[{name:'ATR',type:'line',data:nvData,lineStyle:{width:2,color:'#a32d2d'},showSymbol:false,areaStyle:{color:'rgba(163,45,45,0.08)'},smooth:true}]
  });

  // 图4: 持仓单位
  charts.chart4.setOption({
    tooltip:{trigger:'axis'}, grid:{left:50,right:20,bottom:25,top:10},
    xAxis:{type:'category',data:d.equity.dates,show:false},
    yAxis:{type:'value',min:0,axisLabel:{fontSize:10},name:'单位',nameTextStyle:{fontSize:10}},
    series:[{type:'line',data:d.activeUnits,lineStyle:{width:2,color:'#534ab7'},areaStyle:{color:'rgba(83,74,183,0.2)'},step:'end',showSymbol:false}]
  });
}

function updateUI(r) {
  const m = r.metrics;
  document.getElementById('m_annual').textContent = m.annualReturn + '%';
  document.getElementById('m_sharpe').textContent = m.sharpeRatio;
  document.getElementById('m_dd').textContent = m.maxDrawdown + '%';
  document.getElementById('m_winrate').textContent = m.winRate + '%';
  document.getElementById('m_trades').textContent = m.totalTrades;
  document.getElementById('m_stops').textContent = m.stopLossTrades;
  document.getElementById('m_avgUnits').textContent = r.avgUnits;
  document.getElementById('tradeCount').textContent = '共 ' + m.totalTrades + ' 笔';

  // 交易记录 (最近20笔)
  const tbody = document.getElementById('tradeBody');
  tbody.innerHTML = '';
  const records = r.chartData.tradeRecords || [];
  if (records.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#999">暂无交易</td></tr>';
    return;
  }
  records.slice(-20).reverse().forEach(t => {
    const cls = t.pnl >= 0 ? 'up' : 'down';
    tbody.innerHTML += '<tr><td>'+t.entryDate+'</td><td style="text-align:right">'+t.entryPrice.toFixed(2)+'</td><td>'+t.exitDate+'</td><td style="text-align:right" class="'+cls+'">'+(t.pnl>=0?'+':'')+t.pnl.toFixed(0)+'</td><td style="text-align:right" class="'+cls+'">'+(t.pnlPct>=0?'+':'')+t.pnlPct.toFixed(2)+'%</td><td style="text-align:center">'+t.reason+'</td></tr>';
  });
}

function runBacktest() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const result = runTurtleBacktest({
      stock: document.getElementById('stock').value,
      startDate: document.getElementById('startDate').value,
      endDate: document.getElementById('endDate').value,
      entryWindow: parseInt(document.getElementById('entryWindow').value),
      exitWindow: parseInt(document.getElementById('exitWindow').value),
      atrPeriod: parseInt(document.getElementById('atrPeriod').value),
      riskPct: parseFloat(document.getElementById('riskPct').value) / 100,
      maxUnits: parseInt(document.getElementById('maxUnits').value),
      addStep: parseFloat(document.getElementById('addStep').value),
      initialCapital: parseFloat(document.getElementById('initialCapital').value),
    });

    if (result.error) {
      document.getElementById('errorMsg').textContent = '❌ ' + result.error;
      document.getElementById('errorMsg').style.display = 'block';
      return;
    }

    updateUI(result);
    renderCharts(result);
    document.getElementById('footerInfo').textContent = '✅ 数据: ' + result.chartData.dates.length + ' 个交易日';
    document.getElementById('footerParams').textContent =
      document.querySelector('input[name="system"]:checked').value + ' · entry=' + document.getElementById('entryWindow').value;
  } catch(e) {
    document.getElementById('errorMsg').textContent = '❌ ' + e.message;
    document.getElementById('errorMsg').style.display = 'block';
  } finally {
    btn.disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey && e.key==='Enter') || e.key==='Enter') runBacktest();
});

initCharts();
setTimeout(runBacktest, 300);
</script>
