<html lang="zh-CN">
<head>

  <title>项目优秀作品参考库</title>
  <link rel="icon" href="data:,">
  <style>
    :root {

      --surface: #ffffff;
      --surface-soft: #eef3ef;
      --ink: #1d2524;
      --muted: #60706c;
      --line: #dfe6e1;
      --teal: #0f6b63;
      --teal-dark: #0a4d47;
      --amber: #b9792d;
      --blue: #3f6793;
      --shadow: 0 16px 45px rgba(26, 42, 39, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    a { color: inherit; }
    .shell { min-height: 100vh; }
    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .topbar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 760;
    }
    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .search {
      width: min(420px, 100%);
      position: relative;
      flex: 0 0 380px;
    }
    .search input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }
    .search input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(15, 107, 99, 0.12); }
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 28px 36px;
    }
    .layout {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .filters { padding: 16px; position: sticky; top: 98px; }
    .filters h2, .preview h2 {
      font-size: 14px;
      margin: 0 0 12px;
      color: var(--ink);
    }
    .filter-button {

      background: var(--surface);
      color: var(--ink);
      border-radius: 8px;
      padding: 11px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
    }
    .filter-button span { color: var(--muted); font-size: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .filter-button.active { border-color: var(--teal); color: var(--teal-dark); background: #edf7f3; font-weight: 700; }
    .filter-button:disabled { opacity: .44; cursor: not-allowed; }
    .tag-group {

      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .tag-filter {

      background: var(--surface-soft);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);

      font-size: 12px;

      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 238px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease;
    }
    .case-card:hover, .case-card.active {
      border-color: rgba(15, 107, 99, .55);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .case-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .task-label {
      color: white;
      background: var(--teal);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 760;
    }
    .case-card h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
      letter-spacing: 0;
    }
    .topic { color: var(--muted); font-size: 13px; }
    .why, .caution {
      margin: 0;
      font-size: 13px;
      line-height: 1.65;
      color: #354440;
    }
    .caution { color: var(--muted); }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 12px;
      color: var(--teal-dark);
      background: #edf7f3;
      border: 1px solid #d5ebe4;
      border-radius: 999px;
      padding: 5px 8px;

      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .open-link {
      text-decoration: none;
      background: var(--ink);
      color: white;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .tech { color: var(--muted); font-size: 12px; }
    .preview {
      padding: 16px;
      position: sticky;
      top: 98px;
      min-height: 620px;
    }
    .preview-frame {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      height: 310px;
      background: #f3f5f2;
    }
    iframe { width: 100%; height: 100%; border: 0; background: white; }
    .empty-preview {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
    .preview dl {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 10px 12px;
      margin: 16px 0 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .preview dt { color: var(--muted); }
    .preview dd { margin: 0; overflow-wrap: anywhere; }
    .empty-state {
      padding: 36px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: 8px;
      grid-column: 1 / -1;
    }

      .preview { display: none; }
    }

      .search { flex: 1 1 auto; }
      .layout { grid-template-columns: 1fr; }
      .filters { position: static; }
      .case-list { grid-template-columns: 1fr; }
    }
  </style>

      return (activeTask === "ALL" || item.task === activeTask)
        && (activeTag === "ALL" || item.learning_tags.includes(activeTag))
        && (!query || text.includes(query));
    }

    function render() {
      const rows = showcases.filter(matches);
      if (!rows.length) {
        list.innerHTML = '<div class="empty-state">没有匹配的案例。可以换一个任务或学习点筛选。</div>';
        return;
      }
      list.innerHTML = rows.map((item, index) => `
        <article class="case-card ${index === 0 ? 'active' : ''}" data-id="${escapeAttr(item.id)}">
          <div class="case-meta"><span class="task-label">${item.task}</span></div>
          <div>
            <h3>${escapeHtml(item.title)}</h3>
            <div class="topic">${escapeHtml(item.topic)}</div>
          </div>
          <p class="why">${escapeHtml(item.why_selected)}</p>
          <p class="caution">${escapeHtml(item.caution)}</p>
          <div class="chips">${item.learning_tags.map(tag => `<span class="chip">${escapeHtml(tag)}</span>`).join("")}</div>
          <div class="card-actions">
            <span class="tech">${escapeHtml(item.tech.join(" / "))}</span>
            <a class="open-link" href="${escapeAttr(item.copied_path || item.public_url)}" target="_blank" rel="noreferrer">打开作品</a>
          </div>
        </article>
      `).join("");
      list.querySelectorAll(".case-card").forEach(card => {
        card.addEventListener("click", event => {
          if (event.target.closest("a")) return;
          list.querySelectorAll(".case-card").forEach(el => el.classList.remove("active"));
          card.classList.add("active");
          const item = showcases.find(row => row.id === card.dataset.id);
          setPreview(item);
        });
      });
      setPreview(rows[0]);
    }

    function setPreview(item) {
      if (!item) return;
      const src = item.copied_path || item.public_url;
      previewFrame.innerHTML = `<iframe src="${escapeAttr(src)}" loading="lazy"></iframe>`;
      previewMeta.innerHTML = `
        <dt>任务</dt><dd>${escapeHtml(item.task_title)}</dd>
        <dt>主题</dt><dd>${escapeHtml(item.topic)}</dd>
        <dt>技术</dt><dd>${escapeHtml(item.tech.join(" / "))}</dd>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    }
    function escapeAttr(value) { return escapeHtml(value); }
    render();
  </script>
</body>
</html>
